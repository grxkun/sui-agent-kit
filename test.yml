name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  move-build-test:
    name: Move build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Sui CLI
        run: |
          cargo install --locked --git https://github.com/MystenLabs/sui.git \
            --branch testnet sui 2>/dev/null || true
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build Move modules
        working-directory: move
        run: sui move build

      - name: Run Move tests
        working-directory: move
        run: sui move test --coverage

  sdk-build-test:
    name: SDK build & test
    runs-on: ubuntu-latest
    needs: move-build-test
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Get pnpm store directory
        id: pnpm-cache
        run: echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Cache pnpm modules
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('sdk/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-

      - name: Install dependencies
        working-directory: sdk
        run: pnpm install --frozen-lockfile

      - name: Type check
        working-directory: sdk
        run: pnpm typecheck

      - name: Build SDK
        working-directory: sdk
        run: pnpm build

      - name: Format check
        working-directory: sdk
        run: pnpm format:check

      - name: Lint
        working-directory: sdk
        run: pnpm lint

  publish-dry-run:
    name: npm publish dry run
    runs-on: ubuntu-latest
    needs: sdk-build-test
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Install & build
        working-directory: sdk
        run: |
          pnpm install --frozen-lockfile
          pnpm build

      - name: Dry run publish
        working-directory: sdk
        run: npm publish --dry-run
